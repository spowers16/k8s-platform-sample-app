name: Build and Promote

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_PATH: ${{ vars.GCP_PROJECT_ID }}/platform-images/sample-app

jobs:
  build-and-promote:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider"
          service_account: "github-actions-ci@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        id: build
        run: |
          IMAGE_TAG="git-${{ github.sha }}"
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_PATH }}:${IMAGE_TAG}"
          docker build -t "${IMAGE_REF}" .
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Push Docker image to Artifact Registry
        run: docker push "${{ steps.build.outputs.image_ref }}"

      - name: Checkout k8s-platform-gitops-config
        uses: actions/checkout@v4
        with:
          repository: spowers16/k8s-platform-gitops-config
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-config

      - name: Update image tag in gitops-config
        run: |
          IMAGE_REF="${{ steps.build.outputs.image_ref }}"
          IMAGE_TAG="${{ steps.build.outputs.image_tag }}"
          cd gitops-config

          sed -i "s|image: .*sample-app.*|image: ${IMAGE_REF}|" \
            apps/sample-app/deployment.yaml

          grep "image:" apps/sample-app/deployment.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/sample-app/deployment.yaml
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "No image tag change — skipping commit"
          else
            git commit -m "ci: update sample-app image to ${IMAGE_TAG}

          Source: ${{ github.repository }}@${{ github.sha }}
          Workflow: ${{ github.workflow }} run ${{ github.run_id }}"
            git push
          fi
